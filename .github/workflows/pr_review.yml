name: PR Review with AI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f library-management-system/requirements.txt ]; then
            pip install -r library-management-system/requirements.txt
          fi

      - name: Run tests with coverage
        run: |
          cd library-management-system
          pytest --cov=. --cov-report=term-missing -v || true

  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install anthropic SDK
        run: pip install anthropic

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude).github' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI review
        id: ai_review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PYEOF'
          import anthropic
          import os

          diff = """${{ steps.diff.outputs.diff }}"""

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1024,
              messages=[
                  {
                      "role": "user",
                      "content": f"""Ты — опытный code reviewer. Проанализируй следующий git diff и дай краткий, конструктивный отзыв на русском языке.

          Формат ответа:
          ## AI Code Review

          **Общая оценка:** <оценка>

          **Что хорошо:**
          - <пункт>

          **Предложения по улучшению:**
          - <пункт>

          **Итог:** <краткий итог>

          ---
          *Автоматический AI review (Claude claude-sonnet-4-6)*

          Git diff:
          ```diff
          {diff}
          ```"""
                  }
              ]
          )

          review_text = message.content[0].text
          with open("ai_review.txt", "w", encoding="utf-8") as f:
              f.write(review_text)
          print("AI review generated successfully")
          PYEOF

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('ai_review.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewText
            });
